<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - YouTube Clone</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f1f1f1;
      background-image: url("images/bgc.jpg");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
    }

    .login-box {
      max-width: 500px;
      margin-left: 40%;
      margin-top: 10%;
      margin-right: 100px;
      padding: 30px;
      background-color: #fed957;
      text-align: center;
      border-radius: 16px;
    }

    .login-box:hover {
      box-shadow: 0 0 10px rgb(113, 107, 32);
      transform: scale(1.05);
    }

    .toggle-buttons {
      display: flex;
      gap: 10px;
      margin: 20px 0;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px;
      background: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .toggle-btn.active {
      background: #dc2626;
      color: white;
    }

    .form-group {
      margin: 15px 0;
      text-align: left;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .submit-btn {
      background: #dc2626;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
    }

    .submit-btn:hover {
      background: #b91c1c;
    }

    #google-login {
      background: white;
      color: black;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 20px auto;
      border-radius: 10px;
      height: 45px;
      cursor: pointer;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
      padding: 0 20px;
      width: 100%;
    }

    #google-login:hover {
      box-shadow: 0 0 10px rgb(250, 10, 10);
      transform: scale(1.02);
    }

    .error {
      color: red;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .success {
      color: green;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
    }

    hr {
      margin: 20px 0;
      border: none;
      border-top: 1px solid #ddd;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <img src="images/icons8-google.svg" alt="Google icon" width="50" />
    <h2>Welcome</h2>

    <!-- Toggle Buttons -->
    <div class="toggle-buttons">
      <button class="toggle-btn active" id="showLoginBtn">Login</button>
      <button class="toggle-btn" id="showSignupBtn">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="form active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>
      <button class="submit-btn" id="doLogin">Login</button>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" class="form">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="signupName" placeholder="Your name (optional)">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Create a password">
      </div>
      <button class="submit-btn" id="doSignup">Sign Up</button>
    </div>

    <hr>

    <!-- Google Login Button (Optional - can remove if not needed) -->
    <button id="google-login">
      <img src="images/icons8-google.svg" width="20" />
      <span>Continue with Google (Coming Soon)</span>
    </button>

    <!-- Message Area -->
    <div id="message"></div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';

    // Get elements
    const showLoginBtn = document.getElementById('showLoginBtn');
    const showSignupBtn = document.getElementById('showSignupBtn');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const messageDiv = document.getElementById('message');

    // Toggle between forms
    showLoginBtn.addEventListener('click', () => {
      showLoginBtn.classList.add('active');
      showSignupBtn.classList.remove('active');
      loginForm.classList.add('active');
      signupForm.classList.remove('active');
      messageDiv.innerHTML = '';
    });

    showSignupBtn.addEventListener('click', () => {
      showSignupBtn.classList.add('active');
      showLoginBtn.classList.remove('active');
      signupForm.classList.add('active');
      loginForm.classList.remove('active');
      messageDiv.innerHTML = '';
    });

    // Login functionality
    document.getElementById('doLogin').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        messageDiv.innerHTML = '<span class="error">Please fill all fields</span>';
        return;
      }

      try {
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Save user data
          localStorage.setItem('currentUser', JSON.stringify(data.user));
          messageDiv.innerHTML = '<span class="success">Login successful! Redirecting...</span>';
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        } else {
          messageDiv.innerHTML = `<span class="error">${data.error}</span>`;
        }
      } catch (error) {
        messageDiv.innerHTML = '<span class="error">Server error. Make sure backend is running on port 3000</span>';
      }
    });

    // Signup functionality
    document.getElementById('doSignup').addEventListener('click', async () => {
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;

      if (!email || !password) {
        messageDiv.innerHTML = '<span class="error">Email and password are required</span>';
        return;
      }

      try {
        const response = await fetch(`${API_URL}/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, name })
        });

        const data = await response.json();

        if (response.ok) {
          messageDiv.innerHTML = '<span class="success">Signup successful! Please login.</span>';
          
          // Clear signup form
          document.getElementById('signupName').value = '';
          document.getElementById('signupEmail').value = '';
          document.getElementById('signupPassword').value = '';
          
          // Switch to login form
          showLoginBtn.click();
        } else {
          messageDiv.innerHTML = `<span class="error">${data.error}</span>`;
        }
      } catch (error) {
        messageDiv.innerHTML = '<span class="error">Server error. Make sure backend is running on port 3000</span>';
      }
    });

    // Google login (placeholder for future)
    document.getElementById('google-login').addEventListener('click', () => {
      messageDiv.innerHTML = '<span class="error">Google login coming soon! Please use email/password for now.</span>';
    });

    // Check if already logged in
    const currentUser = localStorage.getItem('currentUser');
    if (currentUser) {
      const user = JSON.parse(currentUser);
      messageDiv.innerHTML = `<span class="success">Welcome back, ${user.name || user.email}! Redirecting...</span>`;
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
    }
  </script>
</body>
</html>
